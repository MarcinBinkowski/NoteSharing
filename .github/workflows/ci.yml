name: CI

on:
  push:
    branches:
      - main
      - 'feat-*'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (backend + frontend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install backend deps
        run: uv sync --project backend --extra dev

      - name: Ruff
        run: uv run --project backend ruff check backend/

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

  test:
    name: Tests (backend)
    runs-on: ubuntu-latest

    env:
      NOTES_DATABASE_BACKEND: sqlite
      NOTES_SQLITE_URL: sqlite+aiosqlite:///./backend/data/notes.db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install backend deps
        run: uv sync --project backend --extra dev

      - name: Create SQLite data directory
        run: mkdir -p backend/data

      - name: Run tests
        run: uv run --project backend pytest tests/ -v
