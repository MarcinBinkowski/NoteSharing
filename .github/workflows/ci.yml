name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (backend + frontend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install backend deps
        run: uv sync --project backend --group dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Pre-commit hooks
        run: uv run --project backend pre-commit run --all-files --show-diff-on-failure
        env:
          SKIP: terraform_fmt,terraform_validate

      - name: ESLint
        working-directory: frontend
        run: npm run lint

  test:
    name: Tests (backend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install backend deps
        run: uv sync --project backend --group dev

      - name: Run unit tests
        run: >
          uv run --project backend pytest
          backend/tests/unit/
          -v -m unit

      - name: Run integration tests
        run: >
          uv run --project backend pytest
          backend/tests/integration/
          -v -m integration -p randomly --randomly-seed=12345
